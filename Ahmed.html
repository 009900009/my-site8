<!DOCTYPE html>
<html lang="ar">
<head>

<title>رسالة حب 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg">

  <div class="card">

    <h1>💖 رسالة حب 💖</h1>

    <div class="divider"></div>

    <h2>💗 هل تقبل تكون حبيبي؟ 💗</h2>

      <button class="yes" onclick="showLove()">❤️ نعم</button>
      <button class="no" onmouseover="moveNo()">💔 لا</button>
    </div>

    <div id="text" class="text">
      💕 بحبك جدا يا احلى حاجة حصلتلي في حياتي 💕<br><br>
      😍 مستني أشوفك كل يوم وأقضي معاك أجمل لحظات
    </div>

    <div class="footer-line"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
